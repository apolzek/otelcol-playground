<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OTLP service bubbles</title>
  <link rel="stylesheet" href="/style.css?v=3">
</head>
<body>
  <header>
    <div class="title">
      <span class="dot" id="status-dot"></span>
      <h1>OTLP service traffic</h1>
    </div>
    <div class="signal-tabs" role="tablist">
      <button class="tab active" data-signal="all"     role="tab">all <small id="cnt-all"></small></button>
      <button class="tab"        data-signal="traces"  role="tab">traces <small id="cnt-traces"></small></button>
      <button class="tab"        data-signal="logs"    role="tab">logs <small id="cnt-logs"></small></button>
      <button class="tab"        data-signal="metrics" role="tab">metrics <small id="cnt-metrics"></small></button>
    </div>
    <div id="meta">connecting&hellip;</div>
    <div class="zoom-controls">
      <button class="tool-btn" id="zoomOut" title="Zoom out (-)">&minus;</button>
      <span class="zoom-display" id="zoomDisplay">100%</span>
      <button class="tool-btn" id="zoomIn" title="Zoom in (+)">&plus;</button>
      <button class="tool-btn reset" id="zoomReset" title="Reset view (0)">reset</button>
    </div>
  </header>
  <main>
    <svg id="chart" preserveAspectRatio="xMidYMid meet"></svg>
  </main>
  <footer>
    <span>scroll = zoom &middot; drag = pan &middot; <kbd>+</kbd>/<kbd>&minus;</kbd>/<kbd>0</kbd> &middot; double-click empties = reset</span>
    <span>radius &propto; &radic;count &middot; top bubble = busiest service.name</span>
  </footer>
  <div id="tooltip" hidden></div>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="/app.js?v=3"></script>
</body>
</html>
