extensions:
  basicauth:
    htpasswd:
      file: /etc/otelcol/auth/htpasswd
      # 'inline' ignorado quando 'file' está setado

  health_check: { endpoint: 0.0.0.0:13133 }

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
        auth: { authenticator: basicauth }
      http:
        endpoint: 0.0.0.0:4318
        auth: { authenticator: basicauth }
        cors: { allowed_origins: [] }

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch:
    send_batch_size: 8192
    timeout: 5s

exporters:
  debug: { verbosity: basic }

service:
  extensions: [basicauth, health_check]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull: { exporter: { prometheus: { host: 0.0.0.0, port: 8888 } } }
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
