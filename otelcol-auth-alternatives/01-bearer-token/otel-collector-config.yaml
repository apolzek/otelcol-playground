extensions:
  bearertokenauth:
    scheme: "Bearer"
    # Lista de tokens válidos (lista YAML pura). A token-api regrava este arquivo
    # a cada mutação e envia SIGHUP ao collector, que recarrega via restart.
    tokens: ${file:/etc/otelcol/tokens/tokens.yaml}

  health_check:
    endpoint: 0.0.0.0:13133

  pprof:
    endpoint: 127.0.0.1:1777   # nunca exposto publicamente

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
        auth:
          authenticator: bearertokenauth
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth
        # CORS desabilitado — collector público não atende browser direto
        cors:
          allowed_origins: []

processors:
  # Memory limiter SEMPRE primeiro — protege contra OOM mesmo com auth válida.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  batch:
    send_batch_size: 8192
    timeout: 5s
    send_batch_max_size: 16384

  # Drop atributos sensíveis que clientes possam mandar por engano
  attributes/scrub:
    actions:
      - { key: http.request.header.authorization, action: delete }
      - { key: http.request.header.cookie,        action: delete }

exporters:
  debug:
    verbosity: basic
  # Em produção, troque por otlp/otlphttp para o backend real (Tempo/Loki/etc).
  # otlp/backend:
  #   endpoint: backend.observability.svc:4317
  #   tls: { insecure: false }

service:
  extensions: [bearertokenauth, health_check, pprof]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: info
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, attributes/scrub, batch]
      exporters:  [debug]
    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, batch]
      exporters:  [debug]
    logs:
      receivers:  [otlp]
      processors: [memory_limiter, attributes/scrub, batch]
      exporters:  [debug]
