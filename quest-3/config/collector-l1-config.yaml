receivers:
  # gRPC on 4317 — tagged otlp.transport=grpc
  otlp/grpc:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

  # HTTP/protobuf on 4318 — default OTLP/HTTP port, tagged otlp.transport=http/protobuf.
  # OTLP/HTTP accepts both protobuf and JSON via Content-Type; we rely on port
  # convention to split them for insight purposes.
  otlp/http-proto:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

  # HTTP/JSON on 4319 — tagged otlp.transport=http/json. Clients that encode in
  # JSON should target this port so the Flink job can attribute them correctly.
  otlp/http-json:
    protocols:
      http:
        endpoint: 0.0.0.0:4319

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  resource/grpc:
    attributes:
      - key: otlp.transport
        value: grpc
        action: upsert

  resource/http-proto:
    attributes:
      - key: otlp.transport
        value: http/protobuf
        action: upsert

  resource/http-json:
    attributes:
      - key: otlp.transport
        value: http/json
        action: upsert

exporters:
  kafka/traces:
    protocol_version: 2.6.0
    brokers: [localhost:9092]
    topic: otlp-traces
    encoding: otlp_proto

  kafka/logs:
    protocol_version: 2.6.0
    brokers: [localhost:9092]
    topic: otlp-logs
    encoding: otlp_proto

  kafka/metrics:
    protocol_version: 2.6.0
    brokers: [localhost:9092]
    topic: otlp-metrics
    encoding: otlp_proto

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]

  pipelines:
    traces/grpc:
      receivers:  [otlp/grpc]
      processors: [memory_limiter, resource/grpc, batch]
      exporters:  [kafka/traces]
    traces/http-proto:
      receivers:  [otlp/http-proto]
      processors: [memory_limiter, resource/http-proto, batch]
      exporters:  [kafka/traces]
    traces/http-json:
      receivers:  [otlp/http-json]
      processors: [memory_limiter, resource/http-json, batch]
      exporters:  [kafka/traces]

    logs/grpc:
      receivers:  [otlp/grpc]
      processors: [memory_limiter, resource/grpc, batch]
      exporters:  [kafka/logs]
    logs/http-proto:
      receivers:  [otlp/http-proto]
      processors: [memory_limiter, resource/http-proto, batch]
      exporters:  [kafka/logs]
    logs/http-json:
      receivers:  [otlp/http-json]
      processors: [memory_limiter, resource/http-json, batch]
      exporters:  [kafka/logs]

    metrics/grpc:
      receivers:  [otlp/grpc]
      processors: [memory_limiter, resource/grpc, batch]
      exporters:  [kafka/metrics]
    metrics/http-proto:
      receivers:  [otlp/http-proto]
      processors: [memory_limiter, resource/http-proto, batch]
      exporters:  [kafka/metrics]
    metrics/http-json:
      receivers:  [otlp/http-json]
      processors: [memory_limiter, resource/http-json, batch]
      exporters:  [kafka/metrics]

  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
