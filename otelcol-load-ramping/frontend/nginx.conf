server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API to the backend so the UI stays same-origin
    # (no CORS) and SSE streams through cleanly.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        # Server-Sent Events (/api/stream): don't buffer, keep it open.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location = /healthz {
        proxy_pass http://backend:8080/healthz;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
