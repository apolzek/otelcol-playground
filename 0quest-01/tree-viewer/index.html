<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tree Domain Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="container header-inner">
      <div class="brand">
        <h1>Tree Domain Viewer</h1>
        <span id="stats" class="stats" aria-live="polite"></span>
      </div>
      <div class="actions">
        <button id="expand-all" class="btn" title="Expand all (E)">Expand all</button>
        <button id="collapse-all" class="btn" title="Collapse all (C)">Collapse all</button>
      </div>
    </div>
  </header>

  <section class="toolbar">
    <div class="container toolbar-inner">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input
          type="search"
          id="search"
          placeholder="Search by name, key, id or prefix...  (/ to focus)"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="filters" id="filters" role="group" aria-label="Type filters"></div>
    </div>
  </section>

  <main class="container main-area">
    <div class="table-head" id="table-head">
      <span class="th th-toggle"></span>
      <span class="th th-badge">Type</span>
      <span class="th th-name">Name</span>
      <span class="th th-key">Key</span>
      <span class="th th-id">ID</span>
      <span class="th th-prefix">Prefix</span>
      <span class="th th-count">Descendants</span>
    </div>

    <div id="tree" class="tree" role="tree" aria-label="Domain tree"></div>
    <div id="empty" class="msg hidden">No results found.</div>
    <div id="error" class="msg error hidden"></div>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel">
      <header class="modal-header">
        <div class="modal-title-wrap">
          <span id="modal-badge" class="badge"></span>
          <h2 id="modal-title"></h2>
        </div>
        <button class="btn modal-close" data-close aria-label="Close">X</button>
      </header>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <footer class="app-footer">
    <div class="container footer-inner">
      <span>Shortcuts:</span>
      <kbd>/</kbd> search | <kbd>E</kbd> expand | <kbd>C</kbd> collapse | <kbd>Esc</kbd> clear search
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
